name: CI - Build Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Maven (mejora velocidad)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # 4. Build Eureka
      - name: Build Eureka Server
        run: |
          cd eureka-server
          mvn clean package -DskipTests

      # 5. Build Servicio Vuelos
      - name: Build Vuelo Service
        run: |
          cd tema06-servicio-vuelos
          mvn clean package -DskipTests

      # 6. Build Docker images
      - name: Build Docker image - Eureka
        run: docker build -t eureka-server ./eureka-server

      - name: Build Docker image - Vuelo
        run: docker build -t servicio-vuelos ./tema06-servicio-vuelos